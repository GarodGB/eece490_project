{% extends "base.html" %}

{% block title %}Admin - Courses - Smart Academic Planning{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h2><i class="bi bi-list-ul me-2"></i> Manage Courses</h2>
    <a href="/admin" class="btn btn-outline-primary"><i class="bi bi-arrow-left me-1"></i> Back to Admin</a>
</div>

<div class="card dashboard-card">
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-6">
                <input type="text" class="form-control" id="adminCourseSearch" placeholder="Search by code, name, or subject...">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="adminLoadCourses()"><i class="bi bi-search"></i> Search</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Subject</th>
                        <th>Credits</th>
                        <th>Level</th>
                        <th>Major</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="adminCoursesTableBody">
                    <tr><td colspan="7" class="text-center text-muted">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        <nav><ul class="pagination justify-content-center mb-0" id="adminCoursesPagination"></ul></nav>
    </div>
</div>

<div class="modal fade" id="adminEditCourseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Course</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="adminEditCourseId">
                <p class="mb-2"><strong id="adminEditCourseCode"></strong></p>
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" id="adminEditCourseName">
                </div>
                <div class="mb-3">
                    <label class="form-label">Credit Hours</label>
                    <input type="number" class="form-control" id="adminEditCourseCredits" min="0" step="0.5">
                </div>
                <div class="mb-3">
                    <label class="form-label">Course Level</label>
                    <input type="number" class="form-control" id="adminEditCourseLevel" min="0">
                </div>
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="adminEditCourseMajor">
                        <label class="form-check-label" for="adminEditCourseMajor">Major course</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="adminSaveCourse()">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var adminCoursesPage = 1;
var adminCoursesTotal = 0;
var adminCoursesPerPage = 20;

function adminLoadCourses() {
    var q = $('#adminCourseSearch').val() || '';
    $.ajax({
        url: '/api/admin/courses?page=' + adminCoursesPage + '&per_page=' + adminCoursesPerPage + (q ? '&q=' + encodeURIComponent(q) : ''),
        method: 'GET',
        headers: { 'Accept': 'application/json' },
        success: function(r) {
            if (!r.success) return;
            adminCoursesTotal = r.total || 0;
            var rows = (r.courses || []);
            var html = '';
            rows.forEach(function(c) {
                html += '<tr><td>' + (c.course_code || '') + '</td><td>' + (c.name || '-') + '</td><td>' + (c.subject || '') + '</td><td>' + (c.credit_hours || 0) + '</td><td>' + (c.course_level || '') + '</td><td>' + (c.is_major_course ? 'Yes' : 'No') + '</td><td><button class="btn btn-sm btn-outline-primary" onclick="adminEditCourse(' + c.id + ', \'' + (c.course_code || '').replace(/'/g, "\\'") + '\', \'' + (c.name || '').replace(/'/g, "\\'") + '\', ' + (c.credit_hours || 0) + ', ' + (c.course_level || 0) + ', ' + (c.is_major_course ? 'true' : 'false') + ')">Edit</button></td></tr>';
            });
            $('#adminCoursesTableBody').html(html || '<tr><td colspan="7" class="text-muted">No courses found.</td></tr>');
            var totalPages = Math.ceil(adminCoursesTotal / adminCoursesPerPage) || 1;
            var pagHtml = '';
            if (adminCoursesPage > 1) pagHtml += '<li class="page-item"><a class="page-link" href="#" onclick="adminCoursesPage=' + (adminCoursesPage-1) + '; adminLoadCourses(); return false;">Prev</a></li>';
            pagHtml += '<li class="page-item disabled"><span class="page-link">Page ' + adminCoursesPage + ' of ' + totalPages + '</span></li>';
            if (adminCoursesPage < totalPages) pagHtml += '<li class="page-item"><a class="page-link" href="#" onclick="adminCoursesPage=' + (adminCoursesPage+1) + '; adminLoadCourses(); return false;">Next</a></li>';
            $('#adminCoursesPagination').html(pagHtml);
        },
        error: function(xhr) {
            if (xhr.status === 403) {
                window.location.href = '/dashboard';
                return;
            }
            $('#adminCoursesTableBody').html('<tr><td colspan="7" class="text-danger">Failed to load courses.</td></tr>');
        }
    });
}

function adminEditCourse(id, code, name, credits, level, isMajor) {
    $('#adminEditCourseId').val(id);
    $('#adminEditCourseCode').text(code);
    $('#adminEditCourseName').val(name);
    $('#adminEditCourseCredits').val(credits);
    $('#adminEditCourseLevel').val(level);
    $('#adminEditCourseMajor').prop('checked', isMajor);
    new bootstrap.Modal(document.getElementById('adminEditCourseModal')).show();
}

function adminSaveCourse() {
    var id = $('#adminEditCourseId').val();
    var payload = {
        name: $('#adminEditCourseName').val(),
        credit_hours: parseFloat($('#adminEditCourseCredits').val()) || 3,
        course_level: parseInt($('#adminEditCourseLevel').val(), 10) || 100,
        is_major_course: $('#adminEditCourseMajor').is(':checked')
    };
    $.ajax({
        url: '/api/admin/courses/' + id,
        method: 'PUT',
        contentType: 'application/json',
        data: JSON.stringify(payload),
        success: function(r) {
            if (r.success) {
                bootstrap.Modal.getInstance(document.getElementById('adminEditCourseModal')).hide();
                adminLoadCourses();
                alert('Course updated.');
            } else alert(r.message || 'Update failed');
        },
        error: function(xhr) {
            var msg = (xhr.responseJSON && xhr.responseJSON.message) || 'Request failed';
            alert(msg);
        }
    });
}

$(document).ready(function() {
    adminLoadCourses();
    $('#adminCourseSearch').on('keypress', function(e) {
        if (e.which === 13) { adminCoursesPage = 1; adminLoadCourses(); }
    });
});
</script>
{% endblock %}
